- type: entity
  parent: [ClothingHandsBase, BaseMinorContraband]
  id: ClothingHandsKnuckledusters
  name: knuckledusters
  description: Wearing these gives an extra impact to your punches.
  components:
  - type: Sprite
    sprite: _Harmony/Clothing/Hands/Gloves/knuckledusters.rsi
    state: knuckledusters
  - type: Clothing
    sprite: _Harmony/Clothing/Hands/Gloves/knuckledusters.rsi
  - type: MeleeWeapon
    attackRate: 1
    damage:
      types:
       Blunt: 10 # Should be Tider friendly
    soundHit:
      collection: Punch
    animation: WeaponArcFist
    mustBeEquippedToUse: true
  - type: Fiber
    fiberMaterial: fibers-metallic
    fiberColor: fibers-silver

- type: entity
  parent: [ClothingHandsBase, BaseCommandContraband]
  id: ClothingHandsKnuckledustersQM
  name: qm's knuckledusters
  description: crack open ores with these 24 karat beauties.
  components:
  - type: Sprite
    sprite: _Harmony/Clothing/Hands/Gloves/knuckledusters.rsi
    state: knuckledusters
  - type: Clothing
    sprite: _Harmony/Clothing/Hands/Gloves/knuckledusters.rsi
  - type: MeleeWeapon
    attackRate: 1.5
    damage:
      types:
       Blunt: 10 # should be equal to or better than tider knuckles
       Structural: 30 # makes them a viable pickaxe
    soundHit:
      collection: Punch
    animation: WeaponArcFist
    mustBeEquippedToUse: true
  - type: Fiber
    fiberMaterial: fibers-metallic
    fiberColor: fibers-gold

- type: entity
  parent: [ClothingHandsBase, BaseSyndicateContraband]
  id: ClothingHandsKnuckledustersSyndi
  name: spiked knuckledusters
  description: red syndicate knuckledusters with spikes
  components:
  - type: Sprite
    sprite: _Harmony/Clothing/Hands/Gloves/knuckledusters.rsi
    state: knuckledusters
  - type: Clothing
    sprite: _Harmony/Clothing/Hands/Gloves/knuckledusters.rsi
  - type: MeleeWeapon
    attackRate: 1.5
    damage:
      types:
       Blunt: 7 # Don't want these to overshadow the Northstars; sacrifices some damage over tider for the spikes
       Piercing: 7 # Makes them less gibbing weapons and more varied weapons while still having good dps
    soundHit:
      collection: Punch
    animation: WeaponArcFist
    mustBeEquippedToUse: true
  - type: Fiber
    fiberMaterial: fibers-metallic
    fiberColor: fibers-red

- type: entity
  parent: ClothingHandsGlovesLatex
  id: ClothingHandsGlovesMantis
  suffix: Mantis
  components:
  - type: Sprite
    sprite: _Harmony/Clothing/Hands/Gloves/mantis.rsi
    layers:
    - state: icon
      map: [ "enum.ToggleVisuals.Layer" ]
  - type: Clothing
    sprite: _Harmony/Clothing/Hands/Gloves/mantis.rsi
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleVisuals.Toggled:
        enum.ToggleVisuals.Layer:
          True:
            sprite: _Harmony/Clothing/Hands/Gloves/mantis_activated.rsi  #Goonstation license forced my hand to do this.
            state: icon
          False:
            sprite: _Harmony/Clothing/Hands/Gloves/mantis.rsi
            state: icon
  - type: ItemToggle
    onUse: false
    onActivate: false
    soundActivate:
      path: /Audio/_Harmony/Weapons/mantison.wav
      params:
        volume: 3
    soundDeactivate:
      path: /Audio/_Harmony/Weapons/mantisoff.wav
      params:
        volume: 3
  - type: ToggleClothing
    action: ActionToggleMantisGloves
    disableOnUnequip: true
  - type: MantisGloves
  - type: ComponentToggler
    components:
    - type: MeleeWeapon
      attackRate: 1.5
      damage:
        types:
          Slash: 15
      mustBeEquippedToUse: true
      animation: WeaponArcClaw
      wideAnimation: WeaponArcClaw
      soundSwing:
        path: /Audio/Weapons/punchmiss.ogg
        params:
          volume: 3
          variation: 0.025
      soundHit:
        path: /Audio/Weapons/bladeslice.ogg
        params:
          volume: 3
          variation: 0.025
    - type: Sharp
    - type: Contraband
      severity: Syndicate
