# Knuckledusters
- type: entity
  parent: [ClothingHandsBase, BaseMinorContraband]
  id: ClothingHandsKnuckledusters
  name: knuckle dusters
  description: punch once, punch hard.
  components:
  - type: Sprite
    sprite: _Harmony/Clothing/Hands/Gloves/knuckledusters.rsi
    state: knuckledusters
  - type: Clothing
    sprite: _Harmony/Clothing/Hands/Gloves/knuckledusters.rsi
  - type: Fiber # should be "metallic flecks", will get to that.
     fiberColor: fibers-black
  - type: MeleeWeapon
    autoAttack: true
    attackRate: 4
    damage:
      types:
       Blunt: 8
    soundHit:
      collection: Punch
    animation: WeaponArcFist
    mustBeEquippedToUse: true
  tags:
    - WhitelistChameleon

